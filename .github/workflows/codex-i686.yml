name: Codex i686 compatibility

on:
  workflow_call:
    inputs:
      codex_revision:
        description: Exact openai/codex commit to test
        required: true
        type: string
      rust_toolchain:
        description: Rust toolchain required by that Codex revision
        required: true
        type: string
  workflow_dispatch:
    inputs:
      codex_revision:
        description: Optional openai/codex commit override
        required: false
        type: string
      rust_toolchain:
        description: Optional Rust toolchain override
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/codex-i686.yml"
      - "Dependencies/upstreams.json"
      - "scripts/build-codex-i686.sh"
      - "scripts/package-runtime-rootfs.sh"
      - "patches/**"
      - "runtime/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/codex-i686.yml"
      - "Dependencies/upstreams.json"
      - "scripts/build-codex-i686.sh"
      - "scripts/package-runtime-rootfs.sh"
      - "patches/**"
      - "runtime/**"

permissions:
  contents: read

jobs:
  app-server:
    name: Build Codex app-server for iSH
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/artifacts/cargo-target
      CARGO_HOME: ${{ github.workspace }}/.codex-local/cargo
      RUSTUP_HOME: ${{ github.workspace }}/.codex-local/rustup

    steps:
      - name: Check out CodexPad
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve pinned upstreams
        shell: bash
        env:
          INPUT_CODEX_REVISION: ${{ inputs.codex_revision }}
          INPUT_RUST_TOOLCHAIN: ${{ inputs.rust_toolchain }}
        run: |
          set -euo pipefail
          revision="${INPUT_CODEX_REVISION:-$(jq -r '.codex.revision' Dependencies/upstreams.json)}"
          toolchain="${INPUT_RUST_TOOLCHAIN:-$(jq -r '.codex.rustToolchain' Dependencies/upstreams.json)}"
          target="$(jq -r '.codex.target' Dependencies/upstreams.json)"
          zig="$(jq -r '.tooling.zig' Dependencies/upstreams.json)"
          [[ "$revision" =~ ^[0-9a-f]{40}$ ]]
          [[ "$toolchain" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$target" == "i686-unknown-linux-musl" ]]
          echo "CODEX_REVISION=$revision" >> "$GITHUB_ENV"
          echo "RUST_TOOLCHAIN=$toolchain" >> "$GITHUB_ENV"
          echo "CODEX_TARGET=$target" >> "$GITHUB_ENV"
          echo "ZIG_VERSION=$zig" >> "$GITHUB_ENV"

      - name: Fetch pinned Codex source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upstream/codex
          git -C upstream/codex init
          git -C upstream/codex remote add origin https://github.com/openai/codex.git
          git -C upstream/codex fetch --depth=1 origin "$CODEX_REVISION"
          git -C upstream/codex checkout --detach FETCH_HEAD
          test "$(git -C upstream/codex rev-parse HEAD)" = "$CODEX_REVISION"

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain "$RUST_TOOLCHAIN" \
                --target "$CODEX_TARGET"
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        shell: bash
        run: cargo install cargo-zigbuild --locked

      - name: Cross-compile app-server
        working-directory: upstream/codex/codex-rs
        shell: bash
        run: $GITHUB_WORKSPACE/scripts/build-codex-i686.sh

      - name: Inspect binary and protocol
        shell: bash
        run: |
          set -euo pipefail
          binary="$CARGO_TARGET_DIR/$CODEX_TARGET/release/codex-app-server"
          file "$binary" | tee artifacts/codex-app-server.file.txt
          test "$(od -An -tu1 -j4 -N1 "$binary" | tr -d ' ')" = "1"
          sha256sum "$binary" | tee artifacts/codex-app-server.sha256
          find upstream/codex/codex-rs/app-server-protocol/schema \
            -type f -print0 | sort -z | xargs -0 sha256sum \
            | sha256sum | tee artifacts/app-server-protocol.sha256

      - name: Package pinned Alpine runtime
        shell: bash
        env:
          CODEX_BINARY: ${{ env.CARGO_TARGET_DIR }}/${{ env.CODEX_TARGET }}/release/codex-app-server
          OUTPUT_ROOTFS: ${{ github.workspace }}/artifacts/codexpad-rootfs.tar.gz
        run: $GITHUB_WORKSPACE/scripts/package-runtime-rootfs.sh

      - name: Inspect runtime image
        shell: bash
        run: |
          set -euo pipefail
          tar -tzf artifacts/codexpad-rootfs.tar.gz \
            | grep -E '^\./(etc/init\.d/codexpad|etc/runlevels/default/codexpad|usr/local/libexec/codexpad/codex-app-server|usr/bin/git|usr/bin/rg)$'
          tar -xOf artifacts/codexpad-rootfs.tar.gz \
            ./usr/local/share/codexpad/runtime.json | jq -e \
            --arg revision "$CODEX_REVISION" '.codexRevision == $revision'

      - name: Upload iSH runtime
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-app-server-i686-musl
          path: |
            artifacts/cargo-target/i686-unknown-linux-musl/release/codex-app-server
            artifacts/codex-app-server.sha256
            artifacts/codex-app-server.file.txt
            artifacts/app-server-protocol.sha256
            artifacts/codexpad-rootfs.tar.gz
            artifacts/codexpad-rootfs.tar.gz.sha256
          if-no-files-found: error
          compression-level: 9
          retention-days: 14

  ipad-app:
    name: Build integrated CodexPad app
    needs: app-server
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out CodexPad
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Download verified runtime
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codex-app-server-i686-musl
          path: artifacts/runtime

      - name: Install iSH build dependencies
        shell: bash
        run: brew install llvm lld ninja libarchive meson

      - name: Build unsigned iPad app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project iSH.xcodeproj \
            -scheme iSH \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            -derivedDataPath "$GITHUB_WORKSPACE/artifacts/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODEXPAD_ROOTFS_PATH="$GITHUB_WORKSPACE/artifacts/runtime/codexpad-rootfs.tar.gz"
          app_path="$(find artifacts/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app_path"
          test -f "$app_path/root.tar.gz"
          cmp "$app_path/root.tar.gz" artifacts/runtime/codexpad-rootfs.tar.gz
          ditto -c -k --sequesterRsrc --keepParent "$app_path" artifacts/CodexPad-unsigned.app.zip

      - name: Upload unsigned iPad app
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CodexPad-unsigned-iPadOS
          path: artifacts/CodexPad-unsigned.app.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
