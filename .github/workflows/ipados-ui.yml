name: iPadOS UI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ipados-ui.yml"
      - "app/**"
      - "iSH.xcodeproj/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ipados-ui.yml"
      - "app/**"
      - "iSH.xcodeproj/**"

permissions:
  contents: read

concurrency:
  group: ipados-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Native iPad workspace smoke test (${{ matrix.profile }})
    runs-on: macos-26
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: 13-inch-standard
            device_hint: 13-inch
            content_size: large
            appearance: light
            test_method: testCodexPadDesktopModeCompleteSurfaceAndFocus
          - profile: 11-inch-standard
            device_hint: 11-inch
            content_size: large
            appearance: light
            test_method: testCodexPadStandardWorkspaceAndTerminalRecovery
          - profile: mini-accessibility
            device_hint: mini
            content_size: accessibility-extra-extra-large
            appearance: dark
            test_method: testCodexPadAccessibilityWorkspaceAndTerminalRecovery

    env:
      DEVICE_HINT: ${{ matrix.device_hint }}
      CONTENT_SIZE: ${{ matrix.content_size }}
      APPEARANCE: ${{ matrix.appearance }}
      TEST_METHOD: ${{ matrix.test_method }}

    steps:
      - name: Check out CodexPad
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install iSH build dependencies
        shell: bash
        run: brew install llvm lld ninja libarchive meson

      - name: Select an available iPad simulator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          xcrun simctl list devices available -j > artifacts/simulators.json
          udid="$(python3 - <<'PY'
          import json
          from pathlib import Path
          import os

          devices = json.loads(Path("artifacts/simulators.json").read_text())["devices"]
          candidates = [
              device
              for runtime in devices.values()
              for device in runtime
              if device.get("isAvailable") and device.get("name", "").startswith("iPad")
          ]
          if not candidates:
              raise SystemExit("No available iPad simulator")
          hint = os.environ["DEVICE_HINT"].casefold()
          preferred = next((d for d in candidates if hint in d["name"].casefold()), None)
          if preferred is None:
              available = ", ".join(sorted(d["name"] for d in candidates))
              raise SystemExit(f"No iPad simulator matching {hint!r}; available: {available}")
          print(preferred["udid"])
          print(f"Selected {preferred['name']} ({preferred['udid']})", file=__import__('sys').stderr)
          PY
          )"
          echo "SIMULATOR_UDID=$udid" >> "$GITHUB_ENV"
          xcrun simctl boot "$udid" 2>/dev/null || true
          xcrun simctl bootstatus "$udid" -b
          xcrun simctl ui "$udid" content_size "$CONTENT_SIZE"
          xcrun simctl ui "$udid" appearance "$APPEARANCE"

      - name: Run native workspace UI test
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild test \
            -project iSH.xcodeproj \
            -scheme iSH \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath "$GITHUB_WORKSPACE/artifacts/CodexPad-UI.xcresult" \
            -only-testing:"iSHUITests/UITests/$TEST_METHOD" \
            -parallel-testing-enabled NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Capture simulator diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/diagnostics
          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --last 20m \
            --style compact \
            --predicate 'process == "CodexPad" OR process == "iSHUITests-Runner"' \
            > artifacts/diagnostics/simulator.log 2>&1
          find "$HOME/Library/Logs/DiagnosticReports" \
            -maxdepth 1 -type f \
            \( -name 'CodexPad*' -o -name 'iSH*' \) \
            -exec cp '{}' artifacts/diagnostics/ \;

      - name: Upload UI test evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: CodexPad-iPadOS-UI-${{ matrix.profile }}
          path: |
            artifacts/CodexPad-UI.xcresult
            artifacts/diagnostics
          if-no-files-found: warn
          compression-level: 6
          retention-days: 14
